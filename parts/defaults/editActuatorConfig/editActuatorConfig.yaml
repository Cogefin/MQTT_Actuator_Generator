osl12306_16:
  use_osl12306_16:       false # true(使う) , false(使わない)
  osl12306_16_digits:        1 # OSL12306_16_NUM_OF_DIGITS
  osl12306_16_type:          0 # OSL12306_16_PIN_TYPE 0(ANODE_COMMON), 1(CATHOD_COMMON)
  osl12306_16_a1_pin:    "D32" # OSL12306_16_PIN_A1
  osl12306_16_a2_pin:    "D26" # OSL12306_16_PIN_A2
  osl12306_16_b_pin:     "D24" # OSL12306_16_PIN_B
  osl12306_16_c_pin:     "D25" # OSL12306_16_PIN_C
  osl12306_16_d1_pin:    "D35" # OSL12306_16_PIN_D1
  osl12306_16_d2_pin:    "D29" # OSL12306_16_PIN_D2
  osl12306_16_e_pin:     "D37" # OSL12306_16_PIN_E
  osl12306_16_f_pin:     "D36" # OSL12306_16_PIN_F
  osl12306_16_g1_pin:    "D39" # OSL12306_16_PIN_G1
  osl12306_16_g2_pin:    "D22" # OSL12306_16_PIN_G2
  osl12306_16_j_pin:     "D34" # OSL12306_16_PIN_J
  osl12306_16_k_pin:     "D30" # OSL12306_16_PIN_K
  osl12306_16_l_pin:     "D28" # OSL12306_16_PIN_L
  osl12306_16_m_pin:     "D27" # OSL12306_16_PIN_M
  osl12306_16_n_pin:     "D31" # OSL12306_16_PIN_N
  osl12306_16_p_pin:     "D33" # OSL12306_16_PIN_P
  osl12306_16_dp_pin:    "D23" # OSL12306_16_PIN_DP
  osl12306_16_digit_pin: "D41" # OSL12306_16_PIN_DIGIT

#
# OSL20541
# USE_OSL20541
osl20541:
  use_osl20541:        false # true(使う) , false(使わない)
  osl20541_digits:         2 # OSL20541_NUM_OF_DIGITS
  osl20541_type:           0 # OSL20541_PIN_TYPE 0(ANODE_COMMON), 1(CATHOD_COMMON)
  osl20541_a_pin:      "D29" # OSL20541_PIN_A
  osl20541_b_pin:      "D25" # OSL20541_PIN_B
  osl20541_c_pin:      "D38" # OSL20541_PIN_C
  osl20541_d_pin:      "D34" # OSL20541_PIN_D
  osl20541_e_pin:      "D22" # OSL20541_PIN_E
  osl20541_f_pin:      "D41" # OSL20541_PIN_F
  osl20541_g1_pin:     "D31" # OSL20541_PIN_G1
  osl20541_g2_pin:     "D32" # OSL20541_PIN_G2
  osl20541_h_pin:      "D39" # OSL20541_PIN_H
  osl20541_j_pin:      "D35" # OSL20541_PIN_J
  osl20541_k_pin:      "D33" # OSL20541_PIN_K
  osl20541_l_pin:      "D30" # OSL20541_PIN_L
  osl20541_m_pin:      "D28" # OSL20541_PIN_M
  osl20541_n_pin:      "D24" # OSL20541_PIN_N
  osl20541_dp_pin:     "D36" # OSL20541_PIN_DP
  osl20541_digit1_pin: "D37" # OSL20541_PIN_DIGIT_1
  osl20541_digit2_pin: "D27" # OSL20541_PIN_DIGIT_2

#
# OSL30561
# USE_OSL30561
osl30561:
  use_osl30561:        false # true(使う) , false(使わない)
  osl30561_digits:         3 # OSL30561_NUM_OF_DIGITS
  osl30561_type:           0 # OSL30561_PIN_TYPE 0(ANODE_COMMON), 1(CATHOD_COMMON)
  osl30561_a_pin:      "D31" # OSL30561_PIN_A
  osl30561_b_pin:      "D23" # OSL30561_PIN_B
  osl30561_c_pin:      "D28" # OSL30561_PIN_C
  osl30561_d_pin:      "D24" # OSL30561_PIN_D
  osl30561_e_pin:      "D22" # OSL30561_PIN_E
  osl30561_f_pin:      "D29" # OSL30561_PIN_F
  osl30561_g_pin:      "D30" # OSL30561_PIN_G
  osl30561_dp_pin:     "D26" # OSL30561_PIN_DP
  osl30561_digit1_pin: "D33" # OSL30561_PIN_DIGIT_1
  osl30561_digit2_pin: "D27" # OSL30561_PIN_DIGIT_2
