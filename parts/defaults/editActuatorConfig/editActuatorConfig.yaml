platform:
  network_hardware:
    network_type: wifi # wifi , ethernet , none
    ethernet_chip_select: "D10" # イーサネットのチップセレクトピン番号
  rtc:
    rtc_type: none # RTC8564NB , DS1307 , DS3231 , PCF8523 , RV8803 , RX8025 , RX8900 , none
  color_led:
    use_led: true # true(使う) , false(使わない)
    led_pin: "D6" # ピン番号
    led_duration: 3000 # 時間(単位:ミリ秒)
    led_short_duration: 1000 # 時間(単位:ミリ秒)
  sd:
    use_sd: false # true(使う) , false(使わない)
    sd_chip_select: "D8" # ピン番号
  wdt:
    wdt_duration: 20000 # 時間(単位:ミリ秒)
    wdt_short_duration: 500 # 時間(単位:ミリ秒)
  advanced:
    hardware_serial: "Serial"
    buffer_size: 512
    max_digit_of_nseg_led: 8

common:
  serial:
    speed: 9600 # コンソールのシリアル速度(bps)
  log:
    host_name: "UnoR4_WiFi" # ホスト名(文字列)
    app_name: "AusEx_mqtt_client" # アプリ名(文字列)
    use_logfile: false # true(使う) , false(使わない)
    use_serial_log: true # true(使う) , false(使わない)
    logfile_name_hdr: "/syslog" # ログファイル名
    logfile_size_max: 10000000 # ログファイルの最大値(バイト)
    log_rotate: false # true(使う) , false(使わない) 現在未対応
  clock:
    use_ntp : false # true(使う) , false(使わない)
    update_rtc_by_ntp : false # true(使う) , false(使わない)

network:
  wifi:
    ssid: "foo" # ssid名
    wifi_pass: "bar" # wifiパスワード
  ethernet:
    mac_addr: [ '0x90', '0xa2', '0xda', '0x10', '0x11', '0x51']  # macアドレス
  ip:
    use_dhcp: true # true(使う) , false(使わない)
    ip_addr: [10, 1, 1, 111] # ipアドレス
    dns_server:  [10, 1, 1, 254] # DNSサーバ
    gateway: [10, 1, 1, 254] # gateway
    netmask: [255, 255, 255, 0] # マスク
  mqtt:
    mqtt_auth: false # true(使う) , false(使わない)
    mqtt_user: "foo" # ユーザ名(文字列)
    mqtt_pass: "bar" # パスワード(文字列)
    mqtt_topic: "arduino/actuator" # MQTTトピック (文字列)
    mqtt_server: "10.1.1.254" # mqttサーバIPアドレス
    mqtt_port: 1883 # mqttポート番号

safety:
  use_wdt: true # true(使う) , false(使わない)

#
# Character LCD
#

#
# Grove character lcd RGB Backlight
# USE_GROVE_LCD
grove_lcd:
  use_grove_lcd: false # true(使う) , false(使わない)

#
# ACM1602NI
# USE_ACM1602NI
acm1602ni:
  use_acm1602ni: false # true(使う) , false(使わない)
  acm1602ni_type: 0 # 0(ACM1602NI), other (ACM2004)

#
# Liquid crystal library
# USE_SC1602BSLB/USE_SC2004CSLB
liquid_crystal:
  use_liquid_crystal:   false # true(使う) , false(使わない)
  liquid_crystal_type:      0 # 0(USE_SC1602BSLB), 1(USE_SC2004CSLB)
  liquid_crystal_rs_pin: "D4" # LIQUID_CRYSTAL_PIN_RS
  liquid_crystal_es_pin: "D5" # LIQUID_CRYSTAL_PIN_ES
  liquid_crystal_d4_pin: "D2" # LIQUID_CRYSTAL_PIN_D4
  liquid_crystal_d5_pin: "D3" # LIQUID_CRYSTAL_PIN_D5
  liquid_crystal_d6_pin: "D0" # LIQUID_CRYSTAL_PIN_D6
  liquid_crystal_d7_pin: "D1" # LIQUID_CRYSTAL_PIN_D7

#
# さまざまなLED
#

#
# Simple mono LED
# USE_SIMPLE_COLOR_LED
simple_mono_led:
  use_simple_mono_led: false # true(使う) , false(使わない)
  simple_mono_led_type: true # GROVE_MONO_LED_PIN_TYPE  true(PULL_UP), false(PULL_DOWN)
  simple_mono_led_pin:  "D2" # GROVE_MONO_LED_PIN

#
# Anode/Cathod common RGB LED
# USE_SIMPLE_COLOR_LED
simple_color_led:
  use_simple_color_led:      false # true(使う) , false(使わない)
  simple_color_led_type:      true # USE_SIMPLE_COLOR_LED_PIN_TYPE  true(PULL_UP), false(PULL_DOWN)
  simple_color_led_red_pin:   "D3" # SIMPLE_COLOR_LED_RED_PIN
  simple_color_led_green_pin: "D4" # SIMPLE_COLOR_LED_GREEN_PIN
  simple_color_led_blue_pin:  "D2" # SIMPLE_COLOR_LED_BLUE_PIN

#
# Grove LED bar
# GROVE_LED_BAR
grove_led_bar:
  use_grove_led_bar:      false # true(使う) , false(使わない)
  grove_led_bar_leds:        10 # GROVE_LED_BAR_NUM_OF_LED
  grove_led_bar_direction:    0 # GROVE_LED_BAR_DIRECTION 0(forward) , 1(backward)
  grove_led_bar_clk_pin :  "D3" # GROVE_LED_BAR_PIN_CLK
  grove_led_bar_data_pin : "D2" # GROVE_LED_BAR_PIN_DATA

#
# Grove LED circular
# GROVE_LED_CIRCULAR
grove_led_circular:
  use_grove_led_circular:      false # true(使う) , false(使わない)
  grove_led_circular_leds:        10 # GROVE_LED_CIRCLE_NUM_OF_LED
  grove_led_circular_direction:    0 # GROVE_LED_CIRCLE_DIRECTION 0(forward) , 1(backward)
  grove_led_circular_clk_pin :  "D3" # GROVE_LED_CIRCLE_PIN_CLK
  grove_led_circular_data_pin : "D2" # GROVE_LED_CIRCLE_PIN_DATA

#
# Grove chainable LED
# GROVE_CHAINABLE_LED
grove_chainable_led:
  use_grove_chainable_led:      false # true(使う) , false(使わない)
  grove_chainable_led_leds:         1 # GROVE_CHAINABLE_LED_NUM_OF_LED
  grove_chainable_led_clk_pin:   "D2" # GROVE_CHAINABLE_LED_PIN_CLK
  grove_chainable_led_data_pin : "D3" # GROVE_CHAINABLE_LED_PIN_DATA

#
# Adafruit NeoPixel
# GROVE_NEO_PIXEL
adafuit_neopixel:
  use_adafuit_neopixel: false # true(使う) , false(使わない)
  adafuit_neopixel_leds:   10 # LED_NEO_PIXEL_NUM_OF_LED
  adafuit_neopixel_pin : "D4" # LED_NEO_PIXEL_PIN

#
# OSL12306-16
