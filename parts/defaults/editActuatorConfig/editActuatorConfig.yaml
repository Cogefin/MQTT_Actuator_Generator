#
# Grove - 4-Digit Display (clock type)
# USE_GROVE_TM1637
grove_tm1637:
  use_grove_tm1637:     false # true(使う) , false(使わない)
  grove_tm1637_clk_pin:  "D2" # GROVE_NSEG_LED_PIN_CLK
  grove_tm1637_data_pin: "D3" # GROVE_NSEG_LED_PIN_DATA

#
# DFRobot DFR0090
# USE_DFR0090
dfr0090:
  use_dfr0090:      false # true(使う) , false(使わない)
  dfr0090_digits:       8 # DFR0090_NUM_OF_DIGITS
  dfr0090_latch_pin: "D4" # DFR0090_LATCH_PIN
  dfr0090_clk_pin:   "D5" # DFR0090_CLOCK_PIN
  dfr0090_data_pin:  "D6" # DFR0090_DATA_PIN

#
# サーボ
# USE_SERVO
servo:
  use_servo: false # true(使う) , false(使わない)
  servo_pin:  "D4" # SERVO_PIN

#
# スピーカー
# SPEAKER
speaker:
  use_speaker: false # true(使う) , false(使わない)
  speaker_pin:  "D4" # SPEAKER_PIN

#
# ブザー
# BUZZER
buzzer:
  use_buzzer: false # true(使う) , false(使わない)
  buzzer_pin:  "D4" # BUZZER_PIN

#
# simple PWM device
# USE_PWM
pwm:
 use_pwm: false # true(使う) , false(使わない)
 pwm_pin:  "D4" # PWM_PIN

#
# simple digital(ON/OFF) device (like switch)
# USE_SWITCH
switch:
  use_switch: false # true(使う) , false(使わない)
  switch_pin: "D4" # SWITCH_PIN

#
# IR LED remote control device
# USE_IRDA
ir_remote:
  use_ir_remote: false # true(使う) , false(使わない)
  ir_remote_pin : "D3" # IR_PIN

#
# MP3 player
#
mp3_player:
  use_mp3_player: false # true(使う) , false(使わない)
  mp3_player_type: 0 # 0(Grove MP3 v2.0 / __USE_KT403A_PLAYER__ ), 1(Grove MP3 v3.0 / __USE_WT2003S_PLAYER__ ), 2(Grove MP3 v4.0 / __USE_WT2605C_PLAYER__ ), 3(DFPlayer mini MP3プレーヤー / __USE_DF_ROBOT_DF_PLAYER_MINI__)

#
# Graphic display
#
graphic_display:
  use_graphic_display:      false # true(使う) , false(使わない)
  graphic_display_type:         0 # 0(USE_GIGA_DISPLAY_GFX) , 1(USE_BODMER_TFT_ESPI) , 2(USE_ADAFRUIT_GFX & TFT_ILI9341_TYPE_1), 3(USE_ADAFRUIT_GFX & TFT_ILI9341_TYPE_2)
  graphic_display_cs_pin:    "D2" # TFT_ILI9341_PIN_CS
  graphic_display_rst_pin:   "D3" # TFT_ILI9341_PIN_RST
  graphic_display_dc_pin:    "D4" # TFT_ILI9341_PIN_DC
  graphic_display_mosi_pin: "D11" # TFT_ILI9341_PIN_MOSI
  graphic_display_miso_pin: "D12" # TFT_ILI9341_PIN_MISO
  graphic_display_clk_pin:  "D13" # TFT_ILI9341_PIN_CLK
