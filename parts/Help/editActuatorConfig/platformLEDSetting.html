<body>
  <h1>動作状態表示用LEDのパラメータ</h1>
<p>
動作状態表示用LEDのパラメータは以下の3種類です．
</p>

<ul>
<li>接続先ピン番号</li>
<li>点灯時間(短)</li>
<li>点灯時間(長)</li>
</ul>

<h2>接続先ピン番号</h2>

<p>
動作状態表示用LEDを接続するピンの番号を「D2」とか「D7」のように数字だけでなく，"D"を付けて入力してください．
</p>

<h2>点灯時間</h2>
<p>
動作状態表示用LEDを点滅させる場合に，点灯時間が短いものと長いものと，見た時に区別が付く程度に違う時間を割り当ててください．
この時の単位はミリ秒となります．
</p>




</body>
</html>
