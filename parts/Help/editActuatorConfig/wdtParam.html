<body>
  <h1>Watch Dog Timerパラメータ</h1>
<p>
ここでは，2種類のパラメータを設定してください．Watch Dog Timerが発火するための時間に2種類あり，1つ目は通常のタイマ発火時間(ミリ秒)でこの値を超えた
時間アクチュエータ等の制御にMCUが掛り切りになり，無反応になった場合に再起動する時間です．ここは長くとも最大数秒となります．
</p>

<p>
2つめは，制御に非常に時間がかかるアクチュエータを取り扱う場合に，最大何秒かかるかを入力します．この時間を超えると端末が再起動します．
</p>

<p>
なお，MCUの型番によって，設定できる最大の時間は異なるため，2番目の数字はMCUの仕様を参照しながら決めてください．
</p>

</body>
</html>
