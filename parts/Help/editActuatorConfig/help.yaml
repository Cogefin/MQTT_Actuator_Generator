#
# loadConfig: |
#   # Arduino sketch生成
#
loadConfig: |
  # configファイルのロード
  本ページでは，以前作成して保存しておいたconfigurationファイルや管理者等から配布されたconfig
  ファイルのテンプレートをロードする．
  
  ------
  ## ファイルの選択
  「configuration file」ボタンを用いて，編集対象のファイルを指定する．　この結果，指定したファイル名が表示される．
  ## Load config file
  「Load config file」ボタンで指定済みのファイルをロードする．ロードに問題が発生しなければ，
  ページが自動的に移動する．

TOC: |
  # 目次
  このページは多数ある設定項目をカテゴリで分けた目次となっている．
  ## 「All option」ボタン
  以前何も編集した事がない場合は，全ての項目を確認もしくは設定する必要があるため，このボタンを押して設定作業に入る．
  ## 既に設定済みのconfigファイルを修正する場合
  再編集すべき設定項目のメニューに対応するボタンを押して，その設定項目に移動する．
  ### hardware
  ネットワークインターフェースやRTC，LEDなどの設定を行う項目
  ### log
  動作ログに関連する設定項目
  ### network
  TCP/IPやMQTTに関する設定項目
  ### misc
  上記に分類できない様々な設定項目
  ### 環境センサ
  温度・湿度・気圧などのセンサに関する設定
  ### 振動・加速度センサ
  振動，加速度センサやジャイロセンサに関する設定項目
  ### 対人センサ
  人感センサ，タッチセンサなど，人に関連するセンサに関する設定項目
  ### 視覚関連センサ
  色彩や照度などのセンサに関する設定項目
  ### その他のセンサ
  上記の分類に属さないセンサに関する設定項目

NetworkMedia: |
  # ネットワークの選択
  ここでは，利用するArduinoが装備するネットワークインターフェースの種類を指定する．
  選択可能なネットワークインターフェースは以下の2種類
  - WiFi
  - 有線イーサネット

EthernetSetting: |
  # MACアドレス指定
  マニュアルにも記載した通り，Arduinoのイーサネットインターフェースには，MACアドレスが
  割り当てられていないため，管理者から割り当ててもらうか，自分で用意したMACアドレスを
  ここで入力する．
  16進数2桁のデータを6個に分けて入力する．また，16進数を示す0xはつける必要がある．

WiFiSetting: |
  # WiFi認証情報
  ここでは，接続するWiFiネットワークのSSIDとパスフレーズを入力する．

rtcSetting: |
  # RTC設定
  このページでは，RTCチップ(IC)を使うか使わないか，使う場合はどの型番のICを使うかを
  選択する．もし，使わない場合は，'none'を選択する．

useLED: |
  # LED利用するか否かの設定
  エラーや動作状況を示すためのフルカラーLEDを利用するか否かをここで選択する．

ledParam: |
  # LEDを接続するピン番号の指定
  自分でセンサ端末のハードウェアを設計した人は，設計に基づいてピン番号を入力する．
  もし，管理者等から設計情報や，組み立て済みのハードウェアを配られた場合は，
  そのハードウェアの情報に基づいて，LEDが接続されるピン番号を入力する．

useSD: |
  # ログ保存用SD/マイクロSDの利用
  動作ログを保存するためにSDを利用する場合は，ここで設定を行う．

sdParam: |
  # SDのパラメータの入力
  ここでは，SDに信号を送るための，チップセレクトピンの番号を入力する．
  入力する番号は設計情報に従う．

serialSpeed: |
  # シリアル通信の速度指定
  ここでは，Arduinoがシリアルにログを出力する場合の通信速度を指定する．
  動作確認する場合，Arduino IDEの画面で作業することになるため，Arduino IDEのデフォルトである9600に
  しておくのが便利．
  MCUとしてESP32が搭載されている機種を用いる場合は，ブートメッセージが115200の通信速度で出力されるため，
  こちらを選択すると便利ではあるが，Arduino IDEやシリアル通信アプリの設定に気をつける必要がある．

logUsage: |
  # ログ出力の選択
  SDやシリアルに動作ログを出力するか否かを選択する．

logField: |
  # ログのフォーマットに関する情報
  ログ出力に含まれるホスト名やアプリケーション名を指定するメニュー

logFileParam: |
  # ログファイルに関する設定
  SDに保存されるログファイル名とログファイルの最大サイズを設定する項目

dhcpFlag: |
  # DHCP利用
  TCP/IPのアドレス設定にDHCPを使うか否かの選択

staticIP1: |
  # 固定IP設定1
  IPアドレスとネットマスクを入力

staticIP2: |
  # 固定IP設定2
  IoTゲートウェイとDNSサーバのIPアドレスを設定

mqttParam: |
  # MQTTに関する設定
  - MQTTで送信するセンサ測定データのフォーマット
  - この端末が送信する場合のMQTTのトピック
  - MQTTサーバ(ブローカー)のIPアドレスもしくはホスト名
  - MQTTサーバ(ブローカー)が待ち受けているポート番号
  - MQTTの認証を利用するか否か
    システム管理者に認証の利用を指示されている場合はここを有効にする．

mqttAuth: |
  # MQTTの認証情報
  MQTTの認証を行う場合は，認証情報を管理者から指示されているはずなので，そのユーザ名とパスフレーズを入力する．

ntpParam: |
  # 端末の時刻設定にNetwork time protocol (NTP)を使うか否かの設定
  一般的なIoTネットワークでは，外部のNTPサーバと通信することは困難であるため，特殊なネットワーク構成の場合しか利用できない．
  - 端末の時刻情報の取得は全てNTPで行う
     この設定を行った場合，ログの出力等，時刻情報が必要な場合に毎回NTP通信を行う．
  - 端末に接続されているRTCの時刻を端末起動時にNTPで設定/更新する．
     通常の動作時の時刻情報はRTCから取得するが，端末起動時(リブートも含む)にNTPで正確な時刻をRTCに設定する．

useWDT: |
  # Watch Dog Timer(WDT)の利用
  マイコンが一定時間以上反応がなくなってしまった場合に，自動的に再起動する仕組みを利用するか否か．
  この機能は利用できるMCUに限定があるため，注意が必要．
  ## 利用できないMCU
  Uno R4系列に搭載されたルネサスのMCUでは利用できない．

wdtParam: |
  # WDTのパラメータ
  無反応になったことを把握するときの時間に関するパラメータ．通常は変更する必要がない．
  マイコンに詳しいユーザが自分のハードウェアの挙動に不安があり，無反応と判断する時間を延ばしたい場合に変更する．

characterDisplayList: |
  # キャラクタディスプレイのリスト
  このページでキャラクタディスプレイのうち，どれを使うかを設定する．個々のパラメータはデバイス選択後に「Nextボタン」で設定メニューに画面遷移する．
  |デバイス名|
  |---|
  |Grove character lcd RGB Backlight|
  |ACM1602|
  |Liquid Crystal Display Library (SC1602/SC2004)|

Grove_character_lcd_RGB_Backlight: |
  # Grove character lcd RGB Backlight
  RGBのカラーバックライトが利用可能なI2C接続キャラクタディスプレイ．ここでは，このデバイスを使うか否かだけを指定する．

acm1602: |
  # ACM1602 I2Cキャラクタディスプレイ
  I2C接続のキャラクタディスプレイ．ここでは，このデバイスを使うか否かだけを指定する．

liquid_crystal_library: |
  # Liquid Crystal Library (SC1602/SC2004)
  Liquid Crystal Libraryで駆動するキャラクタディスプレイ．ここでは，このデバイスを使うか否かとデータ通信用の端子(D4からD7)を接続するArduinoの端子を指定する．

ledList: |
  # LEDの選択
  |デバイス名|
  |---|
  |モノクロLED|
  |アノード/カソードコモンカラーLED|
  |Grove LED Bar|
  |Grove LED circular|
  |Grove chainable LED|
  |Adafruit NeoPixel|
  |OSL12306-16 (16セグメントLED)|
  |OSL20541 (2桁14セグメントLED)|
  |OSL30561 (3桁7セグメントLED)|
  |Grove - 4-Digit Display|
  |DFRobot DFR0090 (8桁7セグメントLED)|

simple_mono_led: |
  # モノクロLED
  ここでは，このデバイスを使うか否か，使う場合にLEDは端子電圧が高/低のどちらの場合にONとなる回路であるかと接続するArduinoの端子番号を入力する．Arduinoの端子はPWM出力に対応している必要がある．

simple_color_led: |
  # アノード/カソードコモンカラーLED
  この種のLEDは赤緑青の3つのモノクロLEDが1個のLEDにまとめられているような形式で，赤,緑,青とGNDの4つの端子を持つ．ここでは，この種類LEDを使うか否か，使う場合にLEDは端子電圧が高/低のどちらの場合にONとなる回路であるかの指定と4つの端子の接続先番号を指定する．接続するArduinoの端子は，PWM出力に対応している必要がある．

grove_led_bar: |
  # Grove LED bar
  10個のLEDが一列に並べられたLEDで，このデバイスを使うか否か，使用するLEDの数，点滅の際の方向(順方向/逆方向)，クロック端子とデータ端子の接続先番号を設定する．

grove_led_circular: |
  # Grove LED circular
  24個のLEDが円形に並べられたLEDで，このデバイスを使うか否か，使用するLEDの数，点滅の際の方向(時計回り/反時計回り)，クロック端子とデータ端子の接続先番号を設定する．

grove_chainable_led: |
  # Grove chainable LED
  このLEDはカラーLED制御用IC(P9813)を用いたフルカラーLEDで，クロックとデータの2つの端子で通信を行う．また，複数のLEDを数珠つなぎに接続して使用することができる．ここでは，このLEDを使うか否か，何個のLEDを使うか，2つの端子の接続先番号を指定する．

adafuit_neopixel: |
  # Adafruit NeoPixel
  このLEDはカラーLED制御用IC(WS2810)を用いたフルカラーLEDで，1端子で通信を行う．また，複数のLEDを数珠つなぎに接続して使用することができる．ここでは，このLEDを使うか否か，何個のLEDを使うか，端子の接続先番号を指定する．

osl12306_16: |
  # OSL12306-16 (16セグメント1桁LED)
  このLEDは16セグメントであり，さまざまな形を印字することができるが，デバイスドライバの関係上，0～9, aからzまでの英字に限定されている．なお，Arduinoと接続するのに必要な端子数が18個も必要であるため，ArduinoはGigaしか対応していない．ここでは，このLEDを利用するか否か，使う場合にLEDは端子電圧が高/低のどちらの場合にONとなる回路であるかと各端子への接続先番号を指定する．

osl20541: |
  # OSL20541 (2桁14セグメントLED)
  このLEDは14セグメントであり，さまざまな形を印字することができるが，デバイスドライバの関係上，0～9, aからzまでの英字に限定されている．なお，Arduinoと接続するのに必要な端子数が18個も必要であるため，ArduinoはGigaしか対応していない．ここでは，このLEDを利用するか否か，使う場合にLEDは端子電圧が高/低のどちらの場合にONとなる回路であるかと各端子への接続先番号を指定する．

osl30561: |
  # OSL30561 (3桁7セグメントLED)
  このLEDは7セグメントであり，0～9, aからfまでの英字に限定されている．なお，Arduinoと接続するのに必要な端子数が11個も必要であるため，ArduinoはGigaしか対応していない．ここでは，このLEDを利用するか否か，使う場合にLEDは端子電圧が高/低のどちらの場合にONとなる回路であるかと各端子への接続先番号を指定する．

grove_tm1637: |
  # Grove - 4-Digit Display
  このデバイスはLED制御用IC(TM1637)を用いたデジタル時計と同じ形式の4桁表示7セグメントLEDである．ここでは，このLEDを使うか否か，クロックとデータの2端子の接続先の番号を指定する．

dfr0090: |
  # DFRobot DFR0090 (8桁7セグメントLED)
  このデバイスはLED制御用IC(74HC595)を用いた8桁表示7セグメントLEDである．ここでは，このLEDを使うか否か，使用する桁数，ラッチ，クロックとデータの3端子の接続先の番号を指定する．

servo: |
  # サーボ
  これは，Arduino標準のサーボライブラリを用いてサーボモータを駆動する．ここでは，サーボモータを使うか否かとサーボモータを接続する端子の番号を定義する．

soundDeviceList: |
  # 音声デバイス選択
  下の表の中から利用するデバイスを選択する．
  |デバイス名|
  |---|
  |スピーカー|
  |ブザー|
  |MP3プレイヤ|
  
speaker: |
  # スピーカー
  1ピンでスピーカーから音を出すデバイスで，スピーカーを用いるか否か，接続する端子の番号を指定する．

buzzer: |
  # ブザー
  1ピンでブザーから音を出すデバイスで，ブザーを用いるか否か，接続する端子の番号を指定する．

mp3_player: |
  # MP3プレイヤー
  ここでは，MP3プレイヤーを使うか否か，使用するプレイヤーの種類(下表参照)を指定する．サポートしているMP3プレイヤーは全てシリアル端子(ほとんどのArduinoではデジタルの0と1)へ接続して利用する．
  |デバイス名|
  |---|
  |Grove MP3 v2.0|
  |Grove MP3 v3.0|
  |Grove MP3 v4.0|
  |DFrRobot DFPlayer mini|

pwm: |
  # 単純PWMデバイス
  ここでは，1つの端子をPulse Width Modulation(PWM)駆動で制御することで利用するタイプのデバイスを使用する場合に設定する項目である．指定する項目は，この種類のデバイスを使うか否かと，接続する端子番号を定義する．注意点として，Arduinoの機種によって，PWM駆動できる端子番号に違いがあるため，Arduino公式サイトのピンマップ等を参照する必要がある．

switch: |
  # 単純デジタル(On/Off)デバイス (例:リレー等)
  ここでは，1つの端子の電圧を高/低切り替えすることで制御するタイプのデバイス(体表例:リレー)を使う場合に設定する項目である．指定する項目は，この種類のデバイスを使うか否かと，接続する端子番号を定義する．

ir_remote: |
  # 赤外線リモコン(IR remote)
  ここでは，Arduinoの家電製品の赤外線リモコンとして利用することができるArduinoのライブラリ(IR remote)を使う場合の設定項目である．指定する項目は，この種類のデバイスを使うか否かと，接続する端子番号を定義する．たたし，IR remoteがArduinoの機種によっては接続端子番号が選ぶことができず，ここで指定したピン番号が無視される可能性があるため，IR remoteライブラリを調べる必要がある．

graphic_display: |
  # グラフィックディスプレイ
  Giga DisplayShieldのようなグラフィックディスプレイを利用する場合に定義する項目となっている．グラフィックディスプレイを利用するか否か，利用する場合の機種(および接続方式)とピン番号を定義する．機種は下の表のいずれかを選択し，Giga Display Shield以外は接続に必要な端子の番号を指定する．ハードウェアSPI接続の場合は，SPIの端子は決まっているため，それ以外の機能を駆動する端子3つを指定し，ソフトウェアSPI接続の場合はSPI機能に必要な端子も含めて全部で6個の端子の接続先番号を定義する．
  |デバイス名|
  |---|
  |GIGA Display Shield|
  |ILI9341 ハードウェアSPI接続|
  |ILI9341 ソフトウェアSPI接続|

saveConfig: |
  # config出力
  編集結果を保存するファイルを指定する．最初にロードしたファイルが更新されるわけではないことに注意．


