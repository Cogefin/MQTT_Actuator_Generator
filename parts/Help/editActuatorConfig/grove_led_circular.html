<h1>Grove - Circular LED</h1>

<pre>
このLEDは制御用IC付きの24セグメントの環状LEDであり，発売元から
<a href="https://wiki.seeedstudio.com/ja/Grove-Circular_LED/">技術情報</a>が取得できる．
</pre>


<pre>
ここで入力するのは，以下の5項目である．
</pre>
<ul>
<li>このLEDを使うか否か</li>
<li>使用するLEDの数</li>
<li>点灯/消灯する際の方向(右回り/左回り)</li>
<li>クロック端子を接続するArduinoのピン番号("D12"のような形式)</li>
<li>データ端子を接続するArduinoのピン番号("D13"のような形式)</li>
</ul>
