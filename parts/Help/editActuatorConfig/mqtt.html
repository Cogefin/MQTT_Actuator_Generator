  <h1>MQTT基本設定</h1>
<pre>
ここでは，IoTプロトコルであるMQTTの各種パラメータ(以下のリスト)を入力します．
</pre>

<ul>
<li>MQTTプロトコルのトピック</li>
<li>MQTTサーバのIPアドレス</li>
<li>MQTTサーバのポート番号</li>
<li>認証を使うか否か</li>
</ul>

<pre>
MQTTのIPアドレスは端末のIPアドレスとは違い，「"aaa.bbb.ccc.ddd"」のように「.(ピリオド)」で接続したものを，そのまま入力してください．
</pre>
