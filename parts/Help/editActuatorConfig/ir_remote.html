  <h1>赤外線リモコン</h1>

<p>
これは赤外線リモコンとして利用できるLEDであり，発売元から
<a href="https://wiki.seeedstudio.com/ja/Grove-Infrared_Reflective_Sensor/">技術情報</a>が取得できる．
</p>


<p>
このデバイスを利用するためには
<a href="https://docs.arduino.cc/libraries/irremote/">IRremoteライブラリ</a>を利用する必要があり，
このライブラリの入手方法等は，<a href="https://docs.arduino.cc/libraries/irremote/">こちら</a>を参照してください．
</p>

<p>
また，<a href="https://docs.arduino.cc/libraries/irremote/">このライブラリ</a>は，Arduinoの機種によって，
LEDを接続する端子が決められているため，詳細な技術情報を参照の上，このピン番号を設定欄に入力してください．
</p>

<p>
ここで入力するのは，以下の2項目である．
</p>
<ul>
<li>このデバイスを使うか否か</li>
<li>制御端子を接続するArduinoのピン番号("D12"のような形式)</li>
</ul>




</body>
</html>
