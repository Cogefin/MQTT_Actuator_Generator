<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ログファイル設定</title>
</head>
<body>
  <h1>ログファイル設定</h1>
<pre>
ArduinoにSDやマイクロSDを接続し，ログをファイルに保存する場合に，ここでパラメータを設定します．ここで入力するパラメータは以下の2つです．
</pre>

<ul>
<li>ファイル名</li>
<li>ファイル最大サイズ</li>
</ul>

<h2>ファイル名</h2>
<pre>
ディレクトリ名を含めて入力する必要があるため，「/syslog」とか「/」入りで入力する必要があります．
また，「/syslog」と入力した場合，「/syslog.txt」というファイルが作られます．
</pre>

<h2>ファイルの最大サイズ</h2>
<pre>
起動時に，ログファイルがここで入力したサイズ以上であった場合，上書きされます．
</pre>

</body>
</html>
