  <h1>Watch Dog Timer設定</h1>
<pre>
ここでは，Watch Dog Timerを使うか否かを設定します．Watch Dog Timerとは，タイマを仕掛けて，一定時間以内にタイマを更新しないと自動的に端末が再起動する仕組みです．ごく一部の機種(ルネサスのMCUを搭載した機種)以外はWatch Dog Timerが利用できるので，これを設定しておけばアクチュエータ端末がダンマリのまま固まることがなくなります．
</pre>


</body>
</html>
