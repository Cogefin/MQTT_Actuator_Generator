  <h1>DFRobot DFR0090 (8桁7セグメントLED)</h1>

  <p>
このLEDは制御用IC付きの8桁7セグメントLEDであり，数珠つなぎで増設可能．発売元から
<a href="https://wiki.dfrobot.com/dfr0090/">製品情報</a>が取得できる．
</p>


<p>
ここで入力するのは，以下の3項目である．
</p>
<ul>
<li>このLEDを使うか否か</li>
<li>利用する桁数</li>
<li>ラッチ端子を接続するArduinoのピン番号("D12"のような形式)</li>
<li>クロック端子を接続するArduinoのピン番号("D13"のような形式)</li>
<li>データ端子を接続するArduinoのピン番号("D14"のような形式)</li>
</ul>
