<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>設定ファイルの選択とロード</title>
</head>
<body>
  <h1>設定ファイルのロード</h1>
  <p>
ここでは，事前に作っておいた仕様ファイルを選択します．「選択」ボタンをクリックすると，ファイルダイアログが表示されるので，
該当のファイルを選択してください．</p>

<p>ファイルの選択が終了したら，「ロード」ボタンをクリックすると，指定した仕様ファイルがロードされ，
ロード時に問題がなければ，「目次」画面に自動的に進みます．
</p>


</body>
</html>
