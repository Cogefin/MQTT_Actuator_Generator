<!DOCTYPE html>

  <title>固定IP設定</title>
</head>
<body>
  <h1>固定IP設定</h1>
<pre>
IoT用アクチュエータ端末を固定IP設定で運用する場合に必要な情報のうち，IPアドレスとネットマスクの情報を
ここで入力します．
</pre>

<h2>IPアドレス</h2>
<pre>IPアドレスが「011.022.033.044」の場合，「.(ピリオド)」で4つに分けてそれぞれの数字を4つの入力欄に分けて入力してください．</pre>

<h2>ネットマスク</h2>
<pre>ネットマスクは「255.255.255.0」や「255.255.255.128」のような値となるが，IPアドレスと同じく，ピリオドで切り分けたものを4つの欄に入力してください．</pre>

</body>
</html>
