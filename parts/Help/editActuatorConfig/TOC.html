  <h1>目次</h1>
  <pre>
ここでは，仕様を定義/変更する項目のボタンをクリックすると，その項目を設定する画面に遷移します．「先頭から順番に設定」ボタンを

  </pre>

<h2>プラットフォーム関係</h2>
<pre>ここでは，アクチュエータ端末として動作するArduinoに接続するリアルタイムクロックやログ保存用のSD，ネットワークに何を用いるか等の設定を行います．</pre>

<h2>アクチュエータ</h2>

<pre>ここに含まれるボタンを押すと，表示されている種類のアクチュエータを利用するために必要な設定を行う画面に遷移します．</pre>
